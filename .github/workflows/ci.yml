name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  changeset:
    name: Changeset Required
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Require changeset for published package changes
        run: pnpm changeset:check origin/${{ github.base_ref }}

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: TypeScript compilation
        run: pnpm -r --filter './packages/*' --filter './plugins/*' exec tsc --noEmit

      - name: Lint check
        run: pnpm lint

  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime dependencies for tests
        run: |
          pnpm --filter @zebric/runtime-core build
          pnpm --filter @zebric/runtime-hono build
          pnpm --filter @zebric/notifications build
          pnpm --filter @zebric/observability build
          pnpm --filter @zebric/runtime-worker build

      - name: Run tests
        run: |
          pnpm --filter @zebric/runtime-core test
          pnpm --filter @zebric/runtime-node test
          pnpm --filter @zebric/runtime-worker test
          pnpm --filter @zebric/cli test
          pnpm --filter @zebric/notifications test

      - name: Generate coverage report
        run: |
          pnpm --filter @zebric/runtime-core test:coverage
          pnpm --filter @zebric/runtime-node test:coverage
          pnpm --filter @zebric/runtime-worker test:coverage
          pnpm --filter @zebric/cli test:coverage
          pnpm --filter @zebric/notifications test:coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: >-
            ./packages/runtime-core/coverage/coverage-final.json,
            ./packages/runtime-node/coverage/coverage-final.json,
            ./packages/runtime-worker/coverage/coverage-final.json,
            ./packages/cli/coverage/coverage-final.json,
            ./packages/notifications/coverage/coverage-final.json
          flags: runtime-core,runtime-node,runtime-worker,cli,notifications
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify build artifacts
        run: |
          echo "Checking build outputs..."
          ls -R packages/*/dist || echo "No dist directories found"

  blueprint-smoke-test:
    name: Blueprint Smoke Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Test task-tracker blueprint parse
        run: |
          echo "Testing task-tracker blueprint..."
          node packages/cli/dist/index.js validate --blueprint examples/task-tracker/blueprint.toml

      - name: Test blog blueprint parse
        run: |
          echo "Testing blog blueprint..."
          node packages/cli/dist/index.js validate --blueprint examples/blog/blueprint.toml

  worker-smoke-test:
    name: Worker Smoke Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run runtime-worker smoke suite
        run: pnpm --filter @zebric/runtime-worker test:smoke

  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm -C packages/docs build

      - name: Astro docs check
        run: pnpm -C packages/docs check

      - name: Link check built docs
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --root-dir packages/docs/dist
            --exclude ^https://docs\.zebric\.dev/
            packages/docs/dist/**/*.html

  all-checks:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [changeset, quality, test, build, blueprint-smoke-test, worker-smoke-test, docs-quality]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Changeset: ${{ needs.changeset.result }}"
          echo "Quality: ${{ needs.quality.result }}"
          echo "Tests: ${{ needs.test.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Blueprint: ${{ needs.blueprint-smoke-test.result }}"
          echo "Worker Smoke: ${{ needs.worker-smoke-test.result }}"
          echo "Docs: ${{ needs.docs-quality.result }}"

          if [ "${{ needs.changeset.result }}" != "success" ] && [ "${{ needs.changeset.result }}" != "skipped" ]; then
            echo "Changeset check failed"
            exit 1
          fi

          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.blueprint-smoke-test.result }}" != "success" ] || \
             [ "${{ needs.worker-smoke-test.result }}" != "success" ] || \
             [ "${{ needs.docs-quality.result }}" != "success" ]; then
            echo "One or more checks failed"
            exit 1
          fi

          echo "All checks passed!"
