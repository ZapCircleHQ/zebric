name: Browser Tests

on:
  push:
    branches: [main]

jobs:
  playwright:
    name: Playwright (rendering, accessibility, journeys)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build runtime dependencies
        run: |
          pnpm --filter @zebric/runtime-core build
          pnpm --filter @zebric/runtime-hono build
          pnpm --filter @zebric/notifications build
          pnpm --filter @zebric/observability build
          pnpm --filter @zebric/runtime-node build

      - name: Install Playwright browsers
        run: pnpm --filter @zebric/runtime-node test:browser:install

      - name: Run browser tests
        run: pnpm --filter @zebric/runtime-node test:browser
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: packages/runtime-node/playwright-report/
          retention-days: 14
