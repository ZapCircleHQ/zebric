events {}

http {
  upstream zebric_apps {
    server zebric-app-worker-heavy-1:3000;
    server zebric-app-worker-heavy-2:3000;
  }

  server {
    listen 8080;

    location / {
      proxy_pass http://zebric_apps;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
